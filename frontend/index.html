<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/static/Logo_AVS_Management.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A1145" />
    <meta name="color-scheme" content="light dark" />
    <script>
      (function () {
        var legacy = localStorage.getItem('avs-theme');
        var stored = localStorage.getItem('ngp:theme');
        if (!stored && legacy) {
          stored = legacy === 'dark' || legacy === 'system' && matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          localStorage.setItem('ngp:theme', stored);
        }
        var theme = stored === 'dark' || stored === 'light' ? stored : matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <title>AVS Management</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
